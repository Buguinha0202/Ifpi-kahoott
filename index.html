<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IFPIFLIX - Quiz Interativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --netflix-red: #E50914; --dark-bg: #090909; }
        body { margin: 0; padding: 0; background-color: var(--dark-bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 24px; box-sizing: border-box; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--netflix-red); margin-bottom: 20px; }
        .glass-card { background: rgba(22, 22, 22, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px 24px; border-radius: 12px; width: 100%; max-width: 340px; }
        
        input { background: rgba(0, 0, 0, 0.5); border: 1px solid #444; padding: 15px; color: #fff; width: 100%; box-sizing: border-box; border-radius: 6px; margin-bottom: 20px; text-align: center; font-size: 1.1rem; font-weight: bold; outline: none; }
        button.btn-main { background: #3b82f6; color: white; padding: 15px; border: none; width: 100%; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        .timer-bar-container { width: 100%; height: 8px; background: #333; position: absolute; top: 0; left: 0; }
        .timer-bar-fill { height: 100%; background: #3b82f6; width: 100%; transition: width 20s linear; }
        
        .answer-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #ccc; padding: 15px; margin-bottom: 10px; width: 100%; text-align: left; border-radius: 8px; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .answer-btn.locked { opacity: 0.6; pointer-events: none; }
        .answer-btn.selected { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; color: #fff; }
        
        .result-box { display: none; padding: 20px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .result-box.correct { display: block; background: rgba(16, 185, 129, 0.2); color: #10b981; border: 2px solid #10b981; }
        .result-box.wrong { display: block; background: rgba(229, 9, 20, 0.2); color: #E50914; border: 2px solid #E50914; }

        /* TELA DE EVENTO FINAL */
        #screen-evt { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #000; padding: 24px; position: relative; }
        #screen-evt.active-evt { animation: alertPulse 0.4s infinite; }
        @keyframes alertPulse { 0%, 100% { background-color: #000; } 50% { background-color: #4a0000; } }
        
        .prog-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-top: 25px; overflow: hidden; }
        .prog-fill { height: 100%; background: #ff0000; width: 0%; border-radius: 6px; transition: width 0.2s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div class="container" id="screen-login">
        <div class="logo">IFPIFLIX QUIZ</div>
        <div class="glass-card">
            <input type="text" id="nickname" placeholder="Seu apelido..." maxlength="12">
            <button class="btn-main" id="btn-entrar">ENTRAR NO JOGO</button>
        </div>
    </div>

    <!-- 2. ESPERA -->
    <div class="container hidden" id="screen-waiting">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; color: #3b82f6; margin-bottom: 20px;"></i>
        <h2>Aguardando início...</h2>
    </div>

    <!-- 3. PERGUNTAS -->
    <div class="container hidden" id="screen-question">
        <div class="timer-bar-container"><div class="timer-bar-fill" id="timer-bar"></div></div>
        <div class="glass-card">
            <div id="q-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;">Carregando...</div>
            <div id="options-container">
                <button class="answer-btn" onclick="lockAnswer('A')"><span class="option-letter">A</span> <span id="opt-a">...</span></button>
                <button class="answer-btn" onclick="lockAnswer('B')"><span class="option-letter">B</span> <span id="opt-b">...</span></button>
                <button class="answer-btn" onclick="lockAnswer('C')"><span class="option-letter">C</span> <span id="opt-c">...</span></button>
                <button class="answer-btn" onclick="lockAnswer('D')"><span class="option-letter">D</span> <span id="opt-d">...</span></button>
            </div>
            <div id="result-feedback" class="result-box"></div>
        </div>
    </div>

    <!-- 4. EVENTO FINAL -->
    <div id="screen-evt">
        <h1 style="font-family: 'Share Tech Mono'; color: #fff;">SISTEMA EM TESTE</h1>
        <div class="prog-bg"><div class="prog-fill" id="alert-progress"></div></div>
    </div>

    <audio id="sound-fx" preload="auto"><source src="alarme.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAYd1ZFIRPLGIsNQnGZ5plSsQYeac171vg", authDomain: "ifpiflix-grupo6.firebaseapp.com", databaseURL: "https://ifpiflix-grupo6-default-rtdb.firebaseio.com", projectId: "ifpiflix-grupo6", storageBucket: "ifpiflix-grupo6.firebasestorage.app", messagingSenderId: "1014663396170", appId: "1:1014663396170:web:9baa564bb45528d97e5fb3" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const scr = { login: document.getElementById('screen-login'), wait: document.getElementById('screen-waiting'), quest: document.getElementById('screen-question'), evt: document.getElementById('screen-evt') };
        let currentChoice = null; let correctAnswer = null;

        const questionsData = {
            'q1': { text: "Qual é o 'elo mais fraco' na Segurança?", a: "Firewall", b: "Antivírus", c: "Usuário", d: "Criptografia", correct: "C" },
            'q2': { text: "O que caracteriza um ataque de Phishing?", a: "Quebrar roteador", b: "Engenharia Social", c: "Vírus em pendrive", d: "Derrubar servidor", correct: "B" }
        };

        window.lockAnswer = function(letter) {
            if(currentChoice) return;
            currentChoice = letter;
            document.querySelectorAll('.answer-btn').forEach(b => {
                b.classList.add('locked');
                if(b.innerText.startsWith(letter)) b.classList.add('selected');
            });
        }

        document.getElementById('btn-entrar').addEventListener('click', () => {
            const nick = document.getElementById('nickname').value.trim();
            if(!nick) return;
            push(ref(db, 'participantes'), { nome: nick });
            Object.values(scr).forEach(s => s.classList.add('hidden'));
            scr.wait.classList.remove('hidden');

            onValue(ref(db, 'quiz_state'), (snap) => {
                const state = snap.val();
                Object.values(scr).forEach(s => s.classList.add('hidden'));
                
                if (state === 'q1' || state === 'q2') {
                    scr.quest.classList.remove('hidden');
                    currentChoice = null;
                    correctAnswer = questionsData[state].correct;
                    document.getElementById('q-text').innerText = questionsData[state].text;
                    document.getElementById('opt-a').innerText = questionsData[state].a;
                    document.getElementById('opt-b').innerText = questionsData[state].b;
                    document.getElementById('opt-c').innerText = questionsData[state].c;
                    document.getElementById('opt-d').innerText = questionsData[state].d;
                    const bar = document.getElementById('timer-bar');
                    bar.style.transition = 'none'; bar.style.width = '100%';
                    setTimeout(() => { bar.style.transition = 'width 20s linear'; bar.style.width = '0%'; }, 50);
                } 
                else if (state === 'q1_result' || state === 'q2_result') {
                    scr.quest.classList.remove('hidden');
                    document.getElementById('options-container').style.display = 'none';
                    const feedback = document.getElementById('result-feedback');
                    if(currentChoice === correctAnswer) { feedback.innerText = "✓ ACERTOU!"; feedback.className = "result-box correct"; }
                    else { feedback.innerHTML = "✗ ERROU!<br>A certa era: " + correctAnswer; feedback.className = "result-box wrong"; }
                }
                else if (state === 'final_evt') {
                    scr.evt.classList.remove('hidden');
                    scr.evt.style.display = 'flex';
                    scr.evt.classList.add('active-evt');
                    document.getElementById('sound-fx').play().catch(()=>{});
                    let p = 0;
                    const int = setInterval(() => {
                        p += 2; document.getElementById('alert-progress').style.width = p + '%';
                        if(p >= 100) clearInterval(int);
                    }, 200);
                }
            });
        });
    </script>
</body>
</html>
